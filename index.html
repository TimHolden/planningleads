<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanningLeads — Find trade opportunities from planning applications</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a class="logo" href="/">
      <div class="logo-icon">📋</div>
      <span class="logo-text">PlanningLeads</span>
    </a>
    <span class="logo-sub">Beta</span>
  </header>

  <div class="filter-bar">

    <!-- Trade type pills -->
    <div class="trade-pills">
      <button class="pill active" data-trade="joinery">Joinery &amp; Carpentry</button>
      <button class="pill" data-trade="roofing">Roofing</button>
      <button class="pill" data-trade="masonry">Masonry</button>
      <button class="pill" data-trade="glazing">Glazing</button>
      <button class="pill" data-trade="plumbing">Plumbing &amp; Heating</button>
    </div>

    <!-- Filters row -->
    <div class="filter-row">

      <div class="filter-group">
        <label>Council area</label>
        <select id="council-select" multiple size="1" title="Hold Ctrl/Cmd to select multiple">
          <!-- populated by JS -->
        </select>
      </div>

      <div class="filter-group">
        <label>Submitted within</label>
        <div class="date-tabs">
          <button class="date-tab" data-days="30">30 days</button>
          <button class="date-tab" data-days="60">60 days</button>
          <button class="date-tab active" data-days="90">90 days</button>
        </div>
      </div>

      <button class="btn-search" id="btn-search">Search</button>

    </div>
  </div>

  <!-- Results -->
  <div class="results-wrapper">
    <div id="results-header" class="results-header"></div>
    <div id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
